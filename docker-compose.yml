
services:
  postgres:
    image: postgres:16-alpine
    container_name: nir-postgres
    env_file: .env
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 2s
      timeout: 5s
      retries: 15
    restart: unless-stopped

  server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nir-server
    env_file: .env
    ports:
      - "50051:50051"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nir-web
    entrypoint: ["/app/web"]
    env_file: .env
    environment:
      GRPC_ADDRESS: "nir-server:50051"
      WEB_ADDRESS: ":8080"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      server:
        condition: service_started
    restart: unless-stopped

volumes:
  pgdata:
