
services:
  postgres:
    image: postgres:16-alpine
    container_name: nir-postgres
    env_file: .env
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 2s
      timeout: 5s
      retries: 15
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: nir-pgadmin
    env_file: .env
    environment:
      PGADMIN_LISTEN_PORT: 5050
    ports:
      - "5050:5050"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nir-server
    env_file: .env
    ports:
      - "50051:50051"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
