syntax = "proto3";

package iam.v1;

option go_package = "nir/proto/iam/v1;iamv1";

import "google/protobuf/timestamp.proto";

enum Environment {
  ENV_UNSPECIFIED = 0;
  PROD = 1;
  STAGE = 2;
  DEV = 3;
}

message Resource {
  string type = 1;
  string name = 2;
  Environment environment = 3;
  string id = 4;
  map<string, string> attributes = 5;
  repeated string labels = 6; // добавили обратно
}

message Role {
  string name = 1;
  repeated string permissions = 2;
  map<string, string> attributes = 3;
}

message Subject {
  string user_id = 1;
  string justification = 2;
  map<string, string> metadata = 3;
}

message AccessRequest {
  Subject subject = 2;
  string requested_for_user_id = 3;
  string requested_by_user_id = 4;
  string delegation_reason = 5;
  Resource resource = 6;
  repeated Role roles = 7;
  int64 duration_value = 8;
  string duration_unit = 9;
  google.protobuf.Timestamp created_at = 10;
  google.protobuf.Timestamp updated_at = 11;
}

message HRRequest {
  string user_id = 1;
  string resource_id = 2;
}

message HRResponse {
  string full_name = 1;
  string position = 2;
  string department = 3;
  string status = 4;
  string manager_id = 5;
  string hr_bp = 6;
  repeated string groups = 7;
  google.protobuf.Timestamp time = 8;
  map<string, string> attributes = 9;
}

message WorkflowStep {
  string name = 1;
  repeated string approver_ids = 2;
  string mode = 3; // ANY / ALL
}

message WorkflowResponse {
  repeated WorkflowStep steps = 2;
  int32 total_steps = 3;
}

message IsApproverRequest {
  int32 step_index = 1;
  string approver_id = 2;
  AccessRequest request = 3;
}

message IsApproverResponse {
  bool is_approver = 1;
}

message PolicyExplain {
  string policy_id = 1;
  string type = 2; // baseline | augment | override | restrict
  int32 priority = 3;
  bool matched = 4;
  repeated string reasons = 5;
}

message ExplainResponse {
  repeated PolicyExplain policies = 2;
}

service IAM {
  rpc CreateAccessRequest(AccessRequest) returns (WorkflowResponse);
  rpc ExplainAccessRequest(AccessRequest) returns (ExplainResponse);
  rpc IsApprover(IsApproverRequest) returns (IsApproverResponse);
}

service HRService {
  rpc GetHRInfo(HRRequest) returns (HRResponse);
}